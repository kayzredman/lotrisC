# Lotris on-prem full stack — MSSQL + Redis + C# API + Next.js web + nginx proxy.
#
# Quick start (from repo root):
#   cp deploy/.env.onprem.example deploy/.env.onprem
#   docker compose -f docker/docker-compose.onprem.yml --env-file deploy/.env.onprem up -d --build
#   docker compose -f docker/docker-compose.onprem.yml --env-file deploy/.env.onprem run --rm bootstrap
#
# Open: http://localhost:9090  (proxy)  |  direct API :9091  |  direct web :9092

name: lotris-onprem

services:

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lotris_onprem_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in deploy/.env.onprem}"
      MSSQL_PID: "${MSSQL_PID:-Developer}"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lotris_onprem_mssql_init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in deploy/.env.onprem}"
      MSSQL_DATABASE: "${MSSQL_DATABASE:-lotris}"
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q
      \"IF DB_ID('$$MSSQL_DATABASE') IS NULL CREATE DATABASE [$$MSSQL_DATABASE];\"
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: lotris_onprem_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: src/Lotris.Api/Dockerfile
    container_name: lotris_onprem_api
    depends_on:
      mssql:
        condition: service_healthy
      mssql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=${MSSQL_DATABASE:-lotris};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET (min 32 chars)}"
      Jwt__Secret: "${JWT_SECRET}"
      Database__ApplyLegacyMigrations: "${DATABASE_APPLY_LEGACY_MIGRATIONS:-true}"
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS:-http://localhost:9090}"
      App__WebUrl: "http://web:3000"
      Reports__OutputPath: "/data/reports"
      Analytics__MinRollupIntervalMinutes: "${ANALYTICS_MIN_ROLLUP_MINUTES:-2}"
      Analytics__MaxRollupIntervalMinutes: "${ANALYTICS_MAX_ROLLUP_MINUTES:-60}"
      Analytics__MinDashboardCacheTtlSeconds: "${ANALYTICS_MIN_CACHE_TTL:-10}"
      Analytics__MaxDashboardCacheTtlSeconds: "${ANALYTICS_MAX_CACHE_TTL:-300}"
      Analytics__MaxDailyBatchRunsPerDay: "${ANALYTICS_MAX_DAILY_BATCH:-4}"
      Analytics__ManualRunCooldownSeconds: "${ANALYTICS_MANUAL_COOLDOWN:-60}"
      Auth__IdentityEnabled: "true"
      OpenApi__Enabled: "${OPENAPI_ENABLED:-true}"
      OpenApi__UiEnabled: "${OPENAPI_UI_ENABLED:-true}"
    volumes:
      - reports_data:/data/reports
    ports:
      - "${LOTRIS_API_PORT:-9091}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${PUBLIC_BASE_URL:-http://localhost:9090}"
        NEXT_PUBLIC_AUTH_PROVIDERS: "${NEXT_PUBLIC_AUTH_PROVIDERS:-identity}"
    container_name: lotris_onprem_web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "${LOTRIS_WEB_PORT:-9092}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: lotris_onprem_proxy
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${LOTRIS_HTTP_PORT:-9090}:80"
    volumes:
      - ./nginx/onprem.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  bootstrap:
    profiles: ["bootstrap"]
    image: curlimages/curl:8.12.1
    container_name: lotris_onprem_bootstrap
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      LOTRIS_BASE_URL: "http://proxy"
      LOTRIS_SKIP_ONBOARDING: "${LOTRIS_SKIP_ONBOARDING:-false}"
      LOTRIS_ADMIN_EMAIL: "${LOTRIS_ADMIN_EMAIL:-admin@lotris.local}"
      LOTRIS_ADMIN_PASSWORD: "${LOTRIS_ADMIN_PASSWORD:-ChangeMe1!Lotris}"
      LOTRIS_ADMIN_NAME: "${LOTRIS_ADMIN_NAME:-Lotris Admin}"
      LOTRIS_TENANT_NAME: "${LOTRIS_TENANT_NAME:-Lotris}"
      LOTRIS_TENANT_SLUG: "${LOTRIS_TENANT_SLUG:-lotris}"
      LOTRIS_DEFAULT_TEAM: "${LOTRIS_DEFAULT_TEAM:-General Support}"
    volumes:
      - ../deploy/scripts/bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"

volumes:
  mssql_data:
    name: lotris_onprem_mssql_data
  redis_data:
    name: lotris_onprem_redis_data
  reports_data:
    name: lotris_onprem_reports_data
