# Lotris on-prem reverse proxy — single entry point on port 80.
# Browser → nginx → web (/) | api (/api, /health, /openapi, /hangfire)

upstream lotris_web {
    server web:3000;
}

upstream lotris_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 32m;

    # API + health + OpenAPI
    location ~ ^/(api|health|openapi|hangfire) {
        proxy_pass         http://lotris_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # SSE streams
    location ~ ^/(api/.+/sse|health/sse) {
        proxy_pass         http://lotris_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Cache-Control 'no-cache';
        proxy_buffering    off;
        chunked_transfer_encoding off;
    }

    # Next.js app
    location / {
        proxy_pass         http://lotris_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
