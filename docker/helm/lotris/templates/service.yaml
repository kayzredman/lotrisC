apiVersion: v1
kind: Service
metadata:
  name: {{ include "lotris.fullname" . }}-api
  labels:
    {{- include "lotris.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "lotris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - port: 8080
      targetPort: http
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lotris.fullname" . }}-web
  labels:
    {{- include "lotris.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "lotris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - port: 3000
      targetPort: http
      name: http
