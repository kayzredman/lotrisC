apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lotris.fullname" . }}-secrets
  labels:
    {{- include "lotris.labels" . | nindent 4 }}
type: Opaque
stringData:
  connectionString: {{ required "api.connectionString is required" .Values.api.connectionString | quote }}
  redisConnectionString: {{ required "api.redisConnectionString is required" .Values.api.redisConnectionString | quote }}
  jwtSecret: {{ required "api.jwtSecret is required (min 32 chars)" .Values.api.jwtSecret | quote }}
