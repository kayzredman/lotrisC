apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lotris.fullname" . }}-api
  labels:
    {{- include "lotris.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "lotris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "lotris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "lotris.fullname" . }}-secrets
                  key: connectionString
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ include "lotris.fullname" . }}-secrets
                  key: redisConnectionString
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lotris.fullname" . }}-secrets
                  key: jwtSecret
            - name: Reports__OutputPath
              value: /data/reports
          volumeMounts:
            - name: reports
              mountPath: /data/reports
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 45
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "lotris.fullname" . }}-reports
